spring.application.name=MS-CARRITO
server.port=8086

spring.datasource.url=jdbc:mysql://localhost:3307/db_carrito?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# FIX: dialecto faltante - sin esto Hibernate puede fallar en algunas versiones
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# NOTA: la carpeta fisica debe ser src/main/resources/db.migration/ (con punto)
spring.flyway.locations=classpath:db.migration

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Logging
logging.level.com.example.MS_carrito=DEBUG
logging.level.org.springframework.web=INFO
# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.enable-hateoas=false
