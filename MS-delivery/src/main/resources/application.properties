spring.application.name=MS-DELIVERY
server.port=9090

# Conexion a DB
spring.datasource.url=jdbc:mysql://localhost:3307/db_delivery?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Feign — nombres de los MS en Eureka
app.feign.pedidos=MS-PEDIDOS
app.feign.usuarios=MS-USUARIOS

# Radio máximo en km para buscar repartidor cercano
app.delivery.radio-busqueda-km=10.0

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.example.MS_delivery=DEBUG

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.enable-hateoas=false
