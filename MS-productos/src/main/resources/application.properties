spring.application.name=MS-PRODUCTOS
server.port=8085

# Conexion a DB
spring.datasource.url=jdbc:mysql://localhost:3307/db_productos?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# FIX: era 'update' - conflicto con Flyway que ya gestiona el esquema.
# Con 'val�date', Hibernate verifica que el schema coincide con las entidades pero NO lo modifica.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.example.MS_productos=DEBUG
# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.enable-hateoas=false
