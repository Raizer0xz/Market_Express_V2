services:

  # ─── Base de datos MySQL ───────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - market-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Eureka Server ────────────────────────────────────────────────
  eureka-server:
    build:
      context: ./MS-eureka-server
      dockerfile: dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - market-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Gateway ──────────────────────────────────────────────────────
  ms-gateway:
    build:
      context: ./MS-gateway
      dockerfile: dockerfile
    container_name: ms-gateway
    ports:
      - "5050:5050"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - market-net

  # ─── Gateway Security ─────────────────────────────────────────────
  ms-gateway-security:
    build:
      context: ./MS_gateway_security
      dockerfile: dockerfile
    container_name: ms-gateway-security
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - market-net

  # ─── MS Usuarios ──────────────────────────────────────────────────
  ms-usuarios:
    build:
      context: ./MS-usuarios
      dockerfile: dockerfile
    container_name: ms-usuarios
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - market-net

  # ─── MS Productos ─────────────────────────────────────────────────
  ms-productos:
    build:
      context: ./MS-productos
      dockerfile: dockerfile
    container_name: ms-productos
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - market-net

  # ─── MS Carrito ───────────────────────────────────────────────────
  ms-carrito:
    build:
      context: ./MS-carrito
      dockerfile: dockerfile
    container_name: ms-carrito
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - market-net

  # ─── MS Sucursales ────────────────────────────────────────────────
  ms-sucursales:
    build:
      context: ./MS-sucursales
      dockerfile: dockerfile
    container_name: ms-sucursales
    ports:
      - "8087:8087"
    environment:
