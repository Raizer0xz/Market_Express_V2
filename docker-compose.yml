services:

  # =========================================================
  # EUREKA SERVER — Puerto 8761
  # =========================================================
  eureka-server:
    build: ./MS-eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"

  # =========================================================
  # MS-SEGURIDAD — Puerto 8082
  # =========================================================
  MS-seguridad:
    build: ./MS_gateway_security
    container_name: MS-seguridad
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server

  # =========================================================
  # MS-USUARIOS — Puerto 8084
  # =========================================================
  MS-usuarios:
    build: ./MS-usuarios
    container_name: MS-usuarios
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server

  # =========================================================
  # MS-SUCURSALES — Puerto 8087
  # =========================================================
  MS-sucursales:
    build: ./MS-sucursales
    container_name: MS-sucursales
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server

  # =========================================================
  # MS-PRODUCTOS — Puerto 8085
  # =========================================================
  MS-productos:
    build: ./MS-productos
    container_name: MS-productos
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server

  # =========================================================
  # MS-CARRITO — Puerto 8086
  # =========================================================
  MS-carrito:
    build: ./MS-carrito
    container_name: MS-carrito
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server
      - MS-productos

  # =========================================================
  # MS-PEDIDOS — Puerto 8088
  # =========================================================
  MS-pedidos:
    build: ./MS-pedidos
    container_name: MS-pedidos
    ports:
      - "8088:8088"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server
      - MS-carrito

  # =========================================================
  # MS-PAGOS — Puerto 9091
  # =========================================================
  MS-pagos:
    build: ./MS-pagos
    container_name: MS-pagos
    ports:
      - "9091:9091"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server
      - MS-pedidos

  # =========================================================
  # MS-INVENTARIO — Puerto 8089
  # =========================================================
  MS-inventario:
    build: ./MS-inventario
    container_name: MS-inventario
    ports:
      - "8089:8089"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server
      - MS-productos

  # =========================================================
  # MS-DELIVERY — Puerto 9090
  # =========================================================
  MS-delivery:
    build: ./MS-delivery
    container_name: MS-delivery
    ports:
      - "9090:9090"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server
      - MS-pedidos

  # =========================================================
  # MS-GATEWAY — Puerto 5050
  # =========================================================
  MS-gateway:
    build: ./MS-gateway
    container_name: MS-gateway
    ports:
      - "5050:5050"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server
      - MS-seguridad
      - MS-usuarios
      - MS-sucursales
      - MS-productos
      - MS-carrito
      - MS-pedidos
      - MS-pagos
      - MS-inventario
      - MS-delivery