    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - market-net

  # ─── MS Inventario ────────────────────────────────────────────────
  ms-inventario:
    build:
      context: ./MS-inventario
      dockerfile: dockerfile
    container_name: ms-inventario
    ports:
      - "8089:8089"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - market-net

  # ─── MS Pagos ─────────────────────────────────────────────────────
  ms-pagos:
    build:
      context: ./MS-pagos
