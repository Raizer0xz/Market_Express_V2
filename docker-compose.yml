    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - market-net

  # ─── MS Pedidos ───────────────────────────────────────────────────
  ms-pedidos:
    build:
      context: ./MS-pedidos
      dockerfile: dockerfile
    container_name: ms-pedidos
    ports:
      - "8088:8088"
    environment:
      SPRING_PROFILES_ACTIVE: docker
