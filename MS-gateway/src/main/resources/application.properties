spring.application.name=ms-gateway
server.port=5050

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

# Spring Cloud Gateway - integracion con Eureka
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# =========================================================
# RUTAS DEL GATEWAY (sin filtro JWT - cada MS valida su token)
# =========================================================

# /auth/** -> MS-SEGURIDAD
spring.cloud.gateway.server.webflux.routes[0].id=ms-seguridad
spring.cloud.gateway.server.webflux.routes[0].uri=lb://MS-SEGURIDAD
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**

# /api/v1/usuarios/** -> MS-USUARIOS
spring.cloud.gateway.server.webflux.routes[1].id=ms-usuarios
spring.cloud.gateway.server.webflux.routes[1].uri=lb://MS-USUARIOS
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/usuarios/**

# /api/v1/sucursales/** -> MS-SUCURSALES
spring.cloud.gateway.server.webflux.routes[2].id=ms-sucursales
spring.cloud.gateway.server.webflux.routes[2].uri=lb://MS-SUCURSALES
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/sucursales/**

# /api/v2/productos/** -> MS-PRODUCTOS
spring.cloud.gateway.server.webflux.routes[3].id=ms-productos
spring.cloud.gateway.server.webflux.routes[3].uri=lb://MS-PRODUCTOS
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/v2/productos/**

# /api/v2/categorias/** -> MS-PRODUCTOS
spring.cloud.gateway.server.webflux.routes[4].id=ms-productos-categorias
spring.cloud.gateway.server.webflux.routes[4].uri=lb://MS-PRODUCTOS
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/v2/categorias/**

# /api/v2/precios/** -> MS-PRODUCTOS
spring.cloud.gateway.server.webflux.routes[5].id=ms-productos-precios
spring.cloud.gateway.server.webflux.routes[5].uri=lb://MS-PRODUCTOS
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/v2/precios/**

# /api/v2/carritos/** -> MS-CARRITO
spring.cloud.gateway.server.webflux.routes[6].id=ms-carrito
spring.cloud.gateway.server.webflux.routes[6].uri=lb://MS-CARRITO
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/v2/carritos/**

# /api/v1/pedidos/** -> MS-PEDIDOS
spring.cloud.gateway.server.webflux.routes[7].id=ms-pedidos
spring.cloud.gateway.server.webflux.routes[7].uri=lb://MS-PEDIDOS
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/api/v1/pedidos/**

# /api/v1/pagos/** -> MS-PAGOS
spring.cloud.gateway.server.webflux.routes[8].id=ms-pagos
spring.cloud.gateway.server.webflux.routes[8].uri=lb://MS-PAGOS
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/api/v1/pagos/**

# /api/v1/inventario/** -> MS-INVENTARIO
spring.cloud.gateway.server.webflux.routes[9].id=ms-inventario
spring.cloud.gateway.server.webflux.routes[9].uri=lb://MS-INVENTARIO
spring.cloud.gateway.server.webflux.routes[9].predicates[0]=Path=/api/v1/inventario/**

# /api/v1/delivery/** -> MS-DELIVERY
spring.cloud.gateway.server.webflux.routes[10].id=ms-delivery
spring.cloud.gateway.server.webflux.routes[10].uri=lb://MS-DELIVERY
spring.cloud.gateway.server.webflux.routes[10].predicates[0]=Path=/api/v1/delivery/**

# /api/v1/repartidores/** -> MS-DELIVERY
spring.cloud.gateway.server.webflux.routes[11].id=ms-delivery-repartidores
spring.cloud.gateway.server.webflux.routes[11].uri=lb://MS-DELIVERY
spring.cloud.gateway.server.webflux.routes[11].predicates[0]=Path=/api/v1/repartidores/**

# =========================================================
# RUTAS SWAGGER (acceso publico a docs)
# =========================================================

spring.cloud.gateway.server.webflux.routes[12].id=swagger-seguridad
spring.cloud.gateway.server.webflux.routes[12].uri=lb://MS-SEGURIDAD
spring.cloud.gateway.server.webflux.routes[12].predicates[0]=Path=/docs/seguridad/v3/api-docs/**
spring.cloud.gateway.server.webflux.routes[12].filters[0]=RewritePath=/docs/seguridad/(?<segment>.*),/$\{segment}

